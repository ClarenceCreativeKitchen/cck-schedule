name: Sync TFC Schedule

on:
  repository_dispatch:
    types: [sync-tfc]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch TFC events for the week
        run: |
          python3 scripts/fetch_tfc.py > events.json.tmp
          mv events.json.tmp events.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update schedule data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push || echo "Push failed (likely concurrent run) — will retry next cycle"
          fi
