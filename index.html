<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCK Kitchen A Schedule</title>
<meta http-equiv="refresh" content="300">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1d26;
    color: #e8e8e8;
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px 14px;
    border-bottom: 2px solid #2a2d38;
  }
  .header-center {
    text-align: center;
  }
  .last-synced {
    font-size: 20px;
    font-weight: 600;
    color: #b0b4c8;
    margin-top: 4px;
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .header .subtitle {
    font-size: 15px;
    color: #7a7e94;
    font-weight: 500;
    max-width: 360px;
    line-height: 1.3;
  }
  .header .week-label {
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.3px;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 28px;
    padding: 12px 40px;
    border-bottom: 1px solid #252830;
    background: #1e2129;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #c0c4d6;
  }
  .legend-dot {
    width: 18px;
    height: 18px;
    border-radius: 4px;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: none;
    padding: 8px 40px;
    background: #1a1520;
    border-bottom: 1px solid #2a2030;
    font-size: 14px;
    color: #e07070;
    font-weight: 600;
  }
  .status-bar.visible { display: block; }
  .status-bar.ok { color: #3ecfb4; background: #141d1a; border-color: #1c2d28; }

  /* ── CALENDAR GRID ── */
  .calendar {
    flex: 1;
    display: grid;
    grid-template-columns: 80px repeat(7, 1fr);
    grid-template-rows: auto 1fr;
    gap: 0;
    padding: 0 20px 20px;
    overflow: hidden;
  }

  /* Day headers */
  .day-header {
    text-align: center;
    padding: 14px 0 10px;
    font-weight: 700;
    font-size: 18px;
    color: #7b7f96;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #2a2d38;
  }
  .day-header.today {
    color: #3ecfb4;
    border-bottom-color: #3ecfb4;
  }
  .day-header .date-num {
    display: block;
    font-size: 32px;
    font-weight: 800;
    margin-top: 2px;
    color: #b0b4c8;
  }
  .day-header.today .date-num {
    color: #3ecfb4;
  }
  .time-header {
    border-bottom: 2px solid #2a2d38;
  }

  /* Day columns */
  .day-column {
    position: relative;
    border-left: 1px solid #252830;
    min-height: 0;
  }
  .day-column.today-col {
    background: rgba(62, 207, 180, 0.03);
  }
  .day-column.past-col {
    background: rgba(0, 0, 0, 0.25);
  }
  .day-column.past-col .event {
    opacity: 0.45;
  }
  .day-header.past {
    opacity: 0.45;
  }

  .time-labels {
    position: relative;
  }
  .time-label {
    position: absolute;
    right: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #5a5e72;
    transform: translateY(-50%);
  }
  .day-column .hour-line-marker {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px solid #252830;
  }

  /* Event blocks */
  .event {
    position: absolute;
    left: 4px;
    right: 4px;
    border-radius: 8px;
    padding: 10px 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-weight: 600;
    border-left: 6px solid;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .event .client-name {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event .time-range {
    font-size: 20px;
    font-weight: 700;
    opacity: 0.9;
    margin-top: 3px;
  }
  .event .space-name {
    font-size: 14px;
    font-weight: 500;
    opacity: 0.65;
    margin-top: 2px;
  }

  /* ── CLIENT COLORS ── */
  .event.client-glcr {
    background: rgba(52, 152, 219, 0.30);
    border-left-color: #3498db;
    color: #f0f4f8;
  }
  .event.client-btbw {
    background: rgba(231, 76, 60, 0.30);
    border-left-color: #e74c3c;
    color: #f8f0f0;
  }
  .event.client-other-1 {
    background: rgba(46, 204, 113, 0.30);
    border-left-color: #2ecc71;
    color: #f0f8f2;
  }
  .event.client-other-2 {
    background: rgba(241, 196, 15, 0.30);
    border-left-color: #f1c40f;
    color: #f8f6f0;
  }
  .event.client-other-3 {
    background: rgba(155, 89, 182, 0.30);
    border-left-color: #9b59b6;
    color: #f4f0f8;
  }
  .event.client-default {
    background: rgba(164, 94, 191, 0.30);
    border-left-color: #A45EBF;
    color: #f4f0f8;
  }

  /* ── NOW INDICATOR ── */
  .now-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 3px;
    background: #3ecfb4;
    z-index: 10;
    box-shadow: 0 0 8px rgba(62, 207, 180, 0.5);
  }
  .now-dot {
    position: absolute;
    left: -5px;
    top: -4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #3ecfb4;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 40px;
    border-top: 1px solid #252830;
    background: #1e2129;
    font-size: 15px;
    color: #5a5e72;
  }

  /* ── EMPTY STATE ── */
  .empty-day {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    color: #2a2d3a;
    font-weight: 600;
  }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #1a1d26;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text {
    font-size: 20px;
    color: #7b7f96;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">Loading schedule...</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>CCK Weekly Live Schedule</h1>
    <span class="subtitle">Updated every 5 minutes; Check TFC for most up-to-date status</span>
  </div>
  <div class="header-center">
    <div class="week-label" id="weekLabel"></div>
    <div class="last-synced" id="lastSynced"></div>
  </div>
  <div style="min-width: 200px"></div>
</div>

<div class="legend" id="legend"></div>

<div class="status-bar" id="statusBar"></div>

<div class="calendar" id="calendar"></div>

<div class="footer">
  <span id="lastUpdated"></span>
  <span id="clock"></span>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════════
const CONFIG = {
  // events.json is generated by a GitHub Action every 30 minutes
  // from TFC's public ganttdata API — no auth, no Google Calendar needed
  DATA_URL: 'events.json',
  TIMEZONE: 'America/New_York',
  HOUR_START: 5,    // 5 AM
  HOUR_END: 23,     // 11 PM
  REFRESH_INTERVAL: 5 * 60 * 1000,

  CLIENT_COLORS: {
    'GLCR':  { class: 'client-glcr', label: 'GLCR', dotColor: '#3498db' },
    'BTBW':  { class: 'client-btbw', label: 'BTBW', dotColor: '#e74c3c' },
  },

  FALLBACK_COLORS: [
    { class: 'client-other-1', dotColor: '#2ecc71' },
    { class: 'client-other-2', dotColor: '#f1c40f' },
    { class: 'client-other-3', dotColor: '#9b59b6' },
    { class: 'client-default',  dotColor: '#A45EBF' },
  ]
};

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentEvents = [];
let clientColorMap = {};
let fallbackIndex = 0;
let lastFetchedAt = null;

const DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TOTAL_HOURS = CONFIG.HOUR_END - CONFIG.HOUR_START;

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function getWeekBounds() {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - dayOfWeek);
  sunday.setHours(0, 0, 0, 0);
  const saturday = new Date(sunday);
  saturday.setDate(sunday.getDate() + 7);
  return { start: sunday, end: saturday };
}

function getWeekDates() {
  const { start } = getWeekBounds();
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function formatHour(h) {
  if (h === 0 || h === 24) return '12 AM';
  if (h === 12) return '12 PM';
  return h < 12 ? h + ' AM' : (h - 12) + ' PM';
}

function formatHourShort(h) {
  if (h === 0 || h === 24) return '12a';
  if (h === 12) return '12p';
  return h < 12 ? h + 'a' : (h - 12) + 'p';
}

function getClientKey(title) {
  const t = title.toUpperCase().trim();
  for (const [prefix, info] of Object.entries(CONFIG.CLIENT_COLORS)) {
    if (t.startsWith(prefix.toUpperCase())) return prefix.toUpperCase();
  }
  const parts = title.split('—');
  return parts[0].trim().toUpperCase();
}

function getClientColorInfo(title) {
  const key = getClientKey(title);
  if (clientColorMap[key]) return clientColorMap[key];

  for (const [prefix, info] of Object.entries(CONFIG.CLIENT_COLORS)) {
    if (key.startsWith(prefix.toUpperCase())) {
      clientColorMap[key] = info;
      return info;
    }
  }

  const fb = CONFIG.FALLBACK_COLORS[fallbackIndex % CONFIG.FALLBACK_COLORS.length];
  fallbackIndex++;
  const info = { class: fb.class, label: key, dotColor: fb.dotColor };
  clientColorMap[key] = info;
  return info;
}

function isSameDay(d1, d2) {
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth() === d2.getMonth() &&
         d1.getDate() === d2.getDate();
}

// Convert UTC millisecond timestamp to a local Date in the display timezone
function msToLocal(ms) {
  return new Date(ms);
}

// ══════════════════════════════════════════════
// FETCH EVENTS FROM events.json
// ══════════════════════════════════════════════
async function fetchEvents() {
  const url = CONFIG.DATA_URL + '?_=' + Date.now(); // cache-bust

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    lastFetchedAt = data.fetchedAt ? new Date(data.fetchedAt) : null;

    currentEvents = (data.events || []).map(ev => {
      const start = msToLocal(ev.startMs);
      const end = msToLocal(ev.endMs);
      return {
        title: ev.title,
        client: ev.title.trim(),
        space: ev.space || '',
        start,
        end,
        startHour: start.getHours() + start.getMinutes() / 60,
        endHour: end.getHours() + end.getMinutes() / 60,
        dayIndex: start.getDay()
      };
    });

    showStatus('Loaded ' + currentEvents.length + ' bookings this week', true);

    // Update last-synced display from the data file's fetchedAt timestamp
    if (lastFetchedAt) {
      document.getElementById('lastSynced').textContent =
        '(Data from ' + lastFetchedAt.toLocaleDateString('en-US', {
          month: 'short', day: 'numeric'
        }) + ' at ' + lastFetchedAt.toLocaleTimeString('en-US', {
          hour: 'numeric', minute: '2-digit', hour12: true
        }) + ')';
    }

    return currentEvents;
  } catch (err) {
    console.error('Failed to fetch events:', err);
    showStatus('Failed to load schedule data. Retrying at next interval...', false);
    return currentEvents;
  }
}

function showStatus(msg, ok) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar visible' + (ok ? ' ok' : '');
  if (ok) setTimeout(() => { bar.classList.remove('visible'); }, 10000);
}

// ══════════════════════════════════════════════
// LEGEND
// ══════════════════════════════════════════════
function buildLegend() {
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';

  clientColorMap = {};
  fallbackIndex = 0;

  const seen = new Set();
  currentEvents.forEach(ev => {
    const key = getClientKey(ev.title);
    if (!seen.has(key)) {
      seen.add(key);
      getClientColorInfo(ev.title);
    }
  });

  for (const [key, info] of Object.entries(clientColorMap)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${info.dotColor}"></div>${info.label}`;
    legendEl.appendChild(item);
  }
}

// ══════════════════════════════════════════════
// RENDER CALENDAR
// ══════════════════════════════════════════════
function buildCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const now = new Date();
  const weekDates = getWeekDates();

  // Week label
  const ws = weekDates[0];
  const we = weekDates[6];
  document.getElementById('weekLabel').textContent =
    `${MONTH_NAMES[ws.getMonth()]} ${ws.getDate()} – ${we.getDate()}, ${ws.getFullYear()}`;

  // Header row
  const timeCorner = document.createElement('div');
  timeCorner.className = 'time-header';
  cal.appendChild(timeCorner);

  weekDates.forEach((d, i) => {
    const hdr = document.createElement('div');
    const isToday = isSameDay(d, now);
    const isPast = d < now && !isToday;
    hdr.className = 'day-header' + (isToday ? ' today' : '') + (isPast ? ' past' : '');
    hdr.innerHTML = `${DAYS[i]}<span class="date-num">${d.getDate()}</span>`;
    cal.appendChild(hdr);
  });

  // Time labels column
  const timeCol = document.createElement('div');
  timeCol.className = 'time-labels';
  timeCol.style.position = 'relative';
  for (let h = CONFIG.HOUR_START; h <= CONFIG.HOUR_END; h++) {
    const pct = ((h - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.style.top = pct + '%';
    lbl.textContent = formatHourShort(h);
    timeCol.appendChild(lbl);
  }
  cal.appendChild(timeCol);

  // Day columns
  for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
    const col = document.createElement('div');
    col.className = 'day-column';

    const isToday = isSameDay(weekDates[dayIdx], now);
    const isPast = weekDates[dayIdx] < now && !isToday;
    if (isToday) col.classList.add('today-col');
    if (isPast) col.classList.add('past-col');

    // Hour grid lines
    for (let h = CONFIG.HOUR_START; h <= CONFIG.HOUR_END; h++) {
      const pct = ((h - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
      const line = document.createElement('div');
      line.className = 'hour-line-marker';
      line.style.top = pct + '%';
      col.appendChild(line);
    }

    // Events for this day
    const dayEvents = currentEvents.filter(e => e.dayIndex === dayIdx);
    dayEvents.forEach(ev => {
      const topPct = ((ev.startHour - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
      const heightPct = ((ev.endHour - ev.startHour) / TOTAL_HOURS) * 100;

      const colorInfo = getClientColorInfo(ev.title);
      const block = document.createElement('div');
      block.className = 'event ' + colorInfo.class;
      block.style.top = topPct + '%';
      block.style.height = heightPct + '%';

      block.innerHTML = `
        <div class="client-name">${ev.client}</div>
        <div class="time-range">${formatHour(Math.floor(ev.startHour))} – ${formatHour(Math.floor(ev.endHour))}</div>
        <div class="space-name">${ev.space}</div>
      `;
      col.appendChild(block);
    });

    // Now indicator
    if (isToday) {
      const nowH = now.getHours() + now.getMinutes() / 60;
      if (nowH >= CONFIG.HOUR_START && nowH <= CONFIG.HOUR_END) {
        const nowPct = ((nowH - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
        const nowLine = document.createElement('div');
        nowLine.className = 'now-line';
        nowLine.style.top = nowPct + '%';
        nowLine.innerHTML = '<div class="now-dot"></div>';
        col.appendChild(nowLine);
      }
    }

    if (dayEvents.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-day';
      empty.textContent = '—';
      col.appendChild(empty);
    }

    cal.appendChild(col);
  }
}

// ══════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
  });
}

// ══════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════
async function init() {
  await fetchEvents();
  buildLegend();
  buildCalendar();

  document.getElementById('lastUpdated').textContent =
    'Live from TFC via GitHub Actions';

  document.getElementById('loadingOverlay').classList.add('hidden');

  updateClock();
  setInterval(updateClock, 1000);

  // Rebuild calendar every minute (updates now-line)
  setInterval(buildCalendar, 60 * 1000);

  // Re-fetch events.json at the configured interval
  setInterval(async () => {
    await fetchEvents();
    buildLegend();
    buildCalendar();
  }, CONFIG.REFRESH_INTERVAL);
}

init();
</script>
</body>
</html>
