<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCK Kitchen A Schedule</title>
<meta http-equiv="refresh" content="300">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1d26;
    color: #e8e8e8;
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Mobile view hidden on desktop */
  .mobile-view { display: none; }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px 14px;
    border-bottom: 2px solid #2a2d38;
  }
  .header-center {
    text-align: center;
  }
  .last-synced {
    font-size: 20px;
    font-weight: 600;
    color: #b0b4c8;
    margin-top: 4px;
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .header .subtitle {
    font-size: 15px;
    color: #7a7e94;
    font-weight: 500;
    max-width: 360px;
    line-height: 1.3;
  }
  .header .week-label {
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.3px;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 28px;
    padding: 12px 40px;
    border-bottom: 1px solid #252830;
    background: #1e2129;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #c0c4d6;
  }
  .legend-dot {
    width: 18px;
    height: 18px;
    border-radius: 4px;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: none;
    padding: 8px 40px;
    background: #1a1520;
    border-bottom: 1px solid #2a2030;
    font-size: 14px;
    color: #e07070;
    font-weight: 600;
  }
  .status-bar.visible { display: block; }
  .status-bar.ok { color: #3ecfb4; background: #141d1a; border-color: #1c2d28; }

  /* ── CALENDAR GRID ── */
  .calendar {
    flex: 1;
    display: grid;
    grid-template-columns: 80px repeat(7, 1fr);
    grid-template-rows: auto 1fr;
    gap: 0;
    padding: 0 20px 20px;
    overflow: hidden;
  }

  /* Day headers */
  .day-header {
    text-align: center;
    padding: 14px 0 10px;
    font-weight: 700;
    font-size: 18px;
    color: #7b7f96;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #2a2d38;
  }
  .day-header.today {
    color: #3ecfb4;
    border-bottom-color: #3ecfb4;
  }
  .day-header .date-num {
    display: block;
    font-size: 32px;
    font-weight: 800;
    margin-top: 2px;
    color: #b0b4c8;
  }
  .day-header.today .date-num {
    color: #3ecfb4;
  }
  .time-header {
    border-bottom: 2px solid #2a2d38;
  }

  /* Day columns */
  .day-column {
    position: relative;
    border-left: 1px solid #252830;
    min-height: 0;
  }
  .day-column.today-col {
    background: rgba(62, 207, 180, 0.03);
  }
  .day-column.past-col {
    background: rgba(0, 0, 0, 0.25);
  }
  .day-column.past-col .event {
    opacity: 0.45;
  }
  .day-header.past {
    opacity: 0.45;
  }

  .time-labels {
    position: relative;
  }
  .time-label {
    position: absolute;
    right: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #5a5e72;
    transform: translateY(-50%);
  }
  .day-column .hour-line-marker {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px solid #252830;
  }

  /* Event blocks */
  .event {
    position: absolute;
    left: 4px;
    right: 4px;
    border-radius: 8px;
    padding: 10px 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-weight: 600;
    border-left: 6px solid;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .event .client-name {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.15;
    overflow: hidden;
    word-break: break-word;
  }
  .event .time-range {
    font-size: 20px;
    font-weight: 700;
    opacity: 0.9;
    margin-top: 3px;
  }
  .event .space-name {
    font-size: 14px;
    font-weight: 500;
    opacity: 0.65;
    margin-top: 2px;
  }

  /* Compact layout for short bookings (≤2 hours) — tighter padding, smaller text */
  .event.compact {
    padding: 2px 10px;
  }
  .event.compact .client-name {
    font-size: 22px;
  }
  .event.compact .time-range {
    font-size: 16px;
    margin-top: 1px;
  }
  .event.compact .space-name {
    display: none;
  }

  /* ── CLIENT COLORS ── */
  /* Named client colors — maximally spread across the color wheel */
  .event.client-glcr {                /* Blue */
    background: rgba(52, 152, 219, 0.30);
    border-left-color: #3498db;
    color: #f0f4f8;
  }
  .event.client-btbw {                /* Red */
    background: rgba(231, 76, 60, 0.30);
    border-left-color: #e74c3c;
    color: #f8f0f0;
  }
  .event.client-gldf {                /* Green */
    background: rgba(46, 204, 113, 0.30);
    border-left-color: #2ecc71;
    color: #f0f8f2;
  }
  .event.client-bowlsrx {             /* Orange */
    background: rgba(243, 156, 18, 0.30);
    border-left-color: #f39c12;
    color: #f8f4f0;
  }
  .event.client-hungrybee {           /* Purple */
    background: rgba(155, 89, 182, 0.30);
    border-left-color: #9b59b6;
    color: #f4f0f8;
  }
  .event.client-vinegars {            /* Hot pink / Magenta */
    background: rgba(232, 67, 147, 0.30);
    border-left-color: #e84393;
    color: #f8f0f4;
  }
  .event.client-globalwarming {       /* Gold / Yellow */
    background: rgba(241, 196, 15, 0.30);
    border-left-color: #f1c40f;
    color: #f8f6f0;
  }

  /* Fallback colors for unknown clients — also maximally distinct */
  .event.client-other-1 {             /* Cyan */
    background: rgba(0, 206, 201, 0.30);
    border-left-color: #00cec9;
    color: #f0f8f8;
  }
  .event.client-other-2 {             /* Indigo */
    background: rgba(108, 92, 231, 0.30);
    border-left-color: #6c5ce7;
    color: #f2f0f8;
  }
  .event.client-other-3 {             /* Coral */
    background: rgba(255, 107, 107, 0.30);
    border-left-color: #ff6b6b;
    color: #f8f0f0;
  }
  .event.client-other-4 {             /* Lime */
    background: rgba(186, 220, 88, 0.30);
    border-left-color: #badc58;
    color: #f6f8f0;
  }
  .event.client-other-5 {             /* Salmon pink */
    background: rgba(253, 121, 168, 0.30);
    border-left-color: #fd79a8;
    color: #f8f0f4;
  }
  .event.client-default {             /* Burnt sienna */
    background: rgba(205, 132, 63, 0.30);
    border-left-color: #cd843f;
    color: #f8f4f0;
  }

  /* ── AMERICA 250 LOGO ── */
  .america250-logo {
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
  }
  .america250-logo svg {
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
  }

  /* Ensure all content sits above fireworks canvas */
  .header, .legend, .status-bar, .calendar, .mobile-view, .footer,
  .loading-overlay, .changelog-overlay {
    position: relative;
    z-index: 1;
  }

  /* ── NOW INDICATOR ── */
  .now-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 3px;
    background: #3ecfb4;
    z-index: 10;
    box-shadow: 0 0 8px rgba(62, 207, 180, 0.5);
  }
  .now-dot {
    position: absolute;
    left: -5px;
    top: -4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #3ecfb4;
  }

  /* ── CHANGELOG PANEL ── */
  .changelog-btn {
    background: #2a2d38;
    border: 1px solid #3a3d4a;
    color: #b0b4c8;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .changelog-btn:hover {
    background: #35384a;
    color: #e0e4f0;
  }
  .changelog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 50;
  }
  .changelog-overlay.open { display: block; }
  .changelog-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 420px;
    max-width: 90vw;
    background: #1e2129;
    border-left: 2px solid #2a2d38;
    z-index: 51;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  .changelog-overlay.open .changelog-panel {
    transform: translateX(0);
  }
  .changelog-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid #2a2d38;
  }
  .changelog-header h2 {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
  }
  .changelog-close {
    background: none;
    border: none;
    color: #7b7f96;
    font-size: 24px;
    cursor: pointer;
    padding: 4px 8px;
    font-family: inherit;
  }
  .changelog-close:hover { color: #e0e4f0; }
  .changelog-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }
  .changelog-empty {
    color: #5a5e72;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    padding: 40px 0;
  }
  .changelog-entry {
    padding: 12px 0;
    border-bottom: 1px solid #252830;
  }
  .changelog-entry:last-child { border-bottom: none; }
  .changelog-time {
    font-size: 12px;
    font-weight: 600;
    color: #5a5e72;
    margin-bottom: 4px;
  }
  .changelog-desc {
    font-size: 15px;
    font-weight: 600;
    color: #c0c4d6;
    line-height: 1.4;
  }
  .changelog-entry.type-added .changelog-desc { color: #2ecc71; }
  .changelog-entry.type-removed .changelog-desc { color: #e74c3c; }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 40px;
    border-top: 1px solid #252830;
    background: #1e2129;
    font-size: 15px;
    color: #5a5e72;
  }

  /* ── EMPTY STATE ── */
  .empty-day {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    color: #2a2d3a;
    font-weight: 600;
  }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #1a1d26;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text {
    font-size: 20px;
    color: #7b7f96;
    font-weight: 600;
  }

  /* ══════════════════════════════════════════════ */
  /* MOBILE RESPONSIVE — vertical day-by-day list  */
  /* ══════════════════════════════════════════════ */
  @media (max-width: 768px) {
    body {
      height: auto;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Hide desktop-only elements */
    .calendar, .legend { display: none !important; }
    .mobile-view { display: block !important; }

    /* Simplified header */
    .header {
      flex-direction: column;
      align-items: flex-start;
      padding: 16px 20px 12px;
      gap: 4px;
    }
    .header h1 { font-size: 22px; }
    .header .subtitle { font-size: 12px; max-width: none; }
    .header .week-label { font-size: 20px; }
    .last-synced { font-size: 13px; }
    .header-center { text-align: left; }
    .header > div:last-child { min-width: auto !important; text-align: left !important; margin-top: 8px; }
    .changelog-btn { font-size: 13px; padding: 5px 12px; }

    /* Footer */
    .footer { padding: 10px 20px; font-size: 13px; }

    /* ── Mobile day sections ── */
    .mobile-view {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 20px;
    }
    .m-day {
      margin-top: 16px;
    }
    .m-day-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 0 8px;
      border-bottom: 2px solid #2a2d38;
    }
    .m-day-name {
      font-size: 14px;
      font-weight: 700;
      color: #7b7f96;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .m-day-date {
      font-size: 20px;
      font-weight: 800;
      color: #b0b4c8;
    }
    .m-day.m-today .m-day-name,
    .m-day.m-today .m-day-date {
      color: #3ecfb4;
    }
    .m-day.m-today .m-day-header {
      border-bottom-color: #3ecfb4;
    }
    .m-day.m-past .m-day-header {
      opacity: 0.45;
    }
    .m-day.m-past .m-event {
      opacity: 0.45;
    }
    .m-no-events {
      padding: 12px 0;
      font-size: 14px;
      color: #3a3d4a;
      font-weight: 600;
    }

    /* ── Mobile event cards ── */
    .m-event {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      margin-top: 8px;
      border-radius: 10px;
      border-left: 5px solid;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .m-event .m-color-bar {
      width: 4px;
      align-self: stretch;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .m-event .m-event-info {
      flex: 1;
      min-width: 0;
    }
    .m-event .m-client {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .m-event .m-time {
      font-size: 15px;
      font-weight: 700;
      opacity: 0.85;
      margin-top: 2px;
    }
    .m-event .m-space {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.6;
      margin-top: 1px;
    }

    /* Mobile client colors — match desktop assignments */
    .m-event.client-glcr {
      background: rgba(52, 152, 219, 0.25);
      border-left-color: #3498db;
      color: #f0f4f8;
    }
    .m-event.client-btbw {
      background: rgba(231, 76, 60, 0.25);
      border-left-color: #e74c3c;
      color: #f8f0f0;
    }
    .m-event.client-gldf {
      background: rgba(46, 204, 113, 0.25);
      border-left-color: #2ecc71;
      color: #f0f8f2;
    }
    .m-event.client-bowlsrx {
      background: rgba(243, 156, 18, 0.25);
      border-left-color: #f39c12;
      color: #f8f4f0;
    }
    .m-event.client-hungrybee {
      background: rgba(155, 89, 182, 0.25);
      border-left-color: #9b59b6;
      color: #f4f0f8;
    }
    .m-event.client-vinegars {
      background: rgba(232, 67, 147, 0.25);
      border-left-color: #e84393;
      color: #f8f0f4;
    }
    .m-event.client-globalwarming {
      background: rgba(241, 196, 15, 0.25);
      border-left-color: #f1c40f;
      color: #f8f6f0;
    }
    .m-event.client-other-1 {
      background: rgba(0, 206, 201, 0.25);
      border-left-color: #00cec9;
      color: #f0f8f8;
    }
    .m-event.client-other-2 {
      background: rgba(108, 92, 231, 0.25);
      border-left-color: #6c5ce7;
      color: #f2f0f8;
    }
    .m-event.client-other-3 {
      background: rgba(255, 107, 107, 0.25);
      border-left-color: #ff6b6b;
      color: #f8f0f0;
    }
    .m-event.client-other-4 {
      background: rgba(186, 220, 88, 0.25);
      border-left-color: #badc58;
      color: #f6f8f0;
    }
    .m-event.client-other-5 {
      background: rgba(253, 121, 168, 0.25);
      border-left-color: #fd79a8;
      color: #f8f0f4;
    }
    .m-event.client-default {
      background: rgba(205, 132, 63, 0.25);
      border-left-color: #cd843f;
      color: #f8f4f0;
    }

    /* Mobile legend (inline at top of mobile view) */
    .m-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      padding: 12px 0;
    }
    .m-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #c0c4d6;
    }
    .m-legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">Loading schedule...</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>CCK Weekly Live Schedule</h1>
    <span class="subtitle" id="subtitleText">Updated every 60 seconds; Check TFC for most up-to-date status</span>

      <button class="changelog-close" onclick="toggleChangelog()">&times;</button>

<div class="legend" id="legend"></div>

<div class="status-bar" id="statusBar"></div>

  <span id="lastUpdated"></span>
  <span id="clock"></span>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════════
const CONFIG = {
  // events.json is generated by a GitHub Action every 30 minutes
  // from TFC's public ganttdata API — no auth, no Google Calendar needed
  DATA_URL: 'events.json',
  TIMEZONE: 'America/New_York',
  HOUR_START_DEFAULT: 5,  // 5 AM default — adjusts earlier if bookings exist
  HOUR_END_DEFAULT: 23,  // 11 PM default — adjusts later if bookings exist
  REFRESH_INTERVAL: 5 * 60 * 1000,

  CLIENT_COLORS: {
    'GLCR':                      { class: 'client-glcr',          label: 'GLCR',                    dotColor: '#3498db' },  // Blue
    'BTBW':                      { class: 'client-btbw',          label: 'BTBW',                    dotColor: '#e74c3c' },  // Red
    'GREAT LAKES DRIED FRUIT':   { class: 'client-gldf',          label: 'Great Lakes Dried Fruit', dotColor: '#2ecc71' },  // Green
    'BOWLSRX':                   { class: 'client-bowlsrx',       label: 'BowlsRx',                dotColor: '#f39c12' },  // Orange
    'HUNGRY BEE':                { class: 'client-hungrybee',     label: 'Hungry Bee',              dotColor: '#9b59b6' },  // Purple
    'VINEGARS ETC':              { class: 'client-vinegars',      label: 'Vinegars Etc',            dotColor: '#e84393' },  // Hot pink
    'GLOBAL WARMING PEPPERS':    { class: 'client-globalwarming', label: 'Global Warming Peppers',  dotColor: '#f1c40f' },  // Gold
  },

  FALLBACK_COLORS: [
    { class: 'client-other-1', dotColor: '#00cec9' },  // Cyan
    { class: 'client-other-2', dotColor: '#6c5ce7' },  // Indigo
    { class: 'client-other-3', dotColor: '#ff6b6b' },  // Coral
    { class: 'client-other-4', dotColor: '#badc58' },  // Lime
    { class: 'client-other-5', dotColor: '#fd79a8' },  // Salmon pink
    { class: 'client-default',  dotColor: '#cd843f' },  // Burnt sienna
  ]
};

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentEvents = [];
let clientColorMap = {};
let fallbackIndex = 0;
let lastFetchedAt = null;

const DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Dynamic hour range — adjusts if bookings fall outside default range
let activeHourStart = CONFIG.HOUR_START_DEFAULT;
let activeHourEnd = CONFIG.HOUR_END_DEFAULT;
let activeTotalHours = activeHourEnd - activeHourStart;

function computeHourRange() {
  let earliest = CONFIG.HOUR_START_DEFAULT;
  let latest = CONFIG.HOUR_END_DEFAULT;
  currentEvents.forEach(ev => {
    if (ev.startHour < earliest) earliest = Math.floor(ev.startHour);
    if (ev.endHour > latest) latest = Math.ceil(ev.endHour);
  });
  activeHourStart = earliest;
  activeHourEnd = latest;
  activeTotalHours = activeHourEnd - activeHourStart;
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function getRollingWindowDates() {
  // Rolling 7-day window: yesterday, today, +5 days forward
  const now = new Date();
  const yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  yesterday.setHours(0, 0, 0, 0);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(yesterday);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function formatHour(h) {
  if (h === 0 || h === 24) return '12 AM';
  if (h === 12) return '12 PM';
  return h < 12 ? h + ' AM' : (h - 12) + ' PM';
}

function formatHourShort(h) {
  if (h === 0 || h === 24) return '12a';
  if (h === 12) return '12p';
  return h < 12 ? h + 'a' : (h - 12) + 'p';
}

function getClientKey(title) {
  const t = title.toUpperCase().trim();
  for (const [prefix, info] of Object.entries(CONFIG.CLIENT_COLORS)) {
    if (t.startsWith(prefix.toUpperCase())) return prefix.toUpperCase();
  }
  const parts = title.split('—');
  return parts[0].trim().toUpperCase();
}

function getClientColorInfo(title) {
  const key = getClientKey(title);
  if (clientColorMap[key]) return clientColorMap[key];

  for (const [prefix, info] of Object.entries(CONFIG.CLIENT_COLORS)) {
    if (key.startsWith(prefix.toUpperCase())) {
      clientColorMap[key] = info;
      return info;
    }
  }

  const fb = CONFIG.FALLBACK_COLORS[fallbackIndex % CONFIG.FALLBACK_COLORS.length];
  fallbackIndex++;
  const info = { class: fb.class, label: key, dotColor: fb.dotColor };
  clientColorMap[key] = info;
  return info;
}

function isSameDay(d1, d2) {
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth() === d2.getMonth() &&
         d1.getDate() === d2.getDate();
}

// Convert UTC millisecond timestamp to a local Date in the display timezone
function msToLocal(ms) {
  return new Date(ms);
}

// ══════════════════════════════════════════════
// FETCH EVENTS FROM events.json
// ══════════════════════════════════════════════
async function fetchEvents() {
  const url = CONFIG.DATA_URL + '?_=' + Date.now(); // cache-bust

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    lastFetchedAt = data.fetchedAt ? new Date(data.fetchedAt) : null;

    currentEvents = (data.events || []).map(ev => {
      const start = msToLocal(ev.startMs);
      const end = msToLocal(ev.endMs);
      return {
        title: ev.title,
        client: ev.title.trim(),
        space: ev.space || '',
        start,
        end,
        startHour: start.getHours() + start.getMinutes() / 60,
        endHour: (function() {
          let eh = end.getHours() + end.getMinutes() / 60;
          // If end is midnight (0:00) and on a different day than start,
          // treat it as 24:00 (end of the start day)
          if (eh === 0 && end.getDate() !== start.getDate()) eh = 24;
          return eh;
        })(),
        dayIndex: start.getDay(),
        // Date key for matching to rolling window columns
        dateKey: start.getFullYear() + '-' + String(start.getMonth()+1).padStart(2,'0') + '-' + String(start.getDate()).padStart(2,'0')
      };
    });

    showStatus('Loaded ' + currentEvents.length + ' bookings this week', true);

    // Update last-synced display from the data file's fetchedAt timestamp
    if (lastFetchedAt) {
      document.getElementById('lastSynced').textContent =
        '(Data from ' + lastFetchedAt.toLocaleDateString('en-US', {
          month: 'short', day: 'numeric'
        }) + ' at ' + lastFetchedAt.toLocaleTimeString('en-US', {
          hour: 'numeric', minute: '2-digit', hour12: true
        }) + ')';
    }

    return currentEvents;
  } catch (err) {
    console.error('Failed to fetch events:', err);
    showStatus('Failed to load schedule data. Retrying at next interval...', false);
    return currentEvents;
  }
}

function showStatus(msg, ok) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar visible' + (ok ? ' ok' : '');
  if (ok) setTimeout(() => { bar.classList.remove('visible'); }, 10000);
}

// ══════════════════════════════════════════════
// LEGEND
// ══════════════════════════════════════════════
function buildLegend() {
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';

  clientColorMap = {};
  fallbackIndex = 0;

  const seen = new Set();
  currentEvents.forEach(ev => {
    const key = getClientKey(ev.title);
    if (!seen.has(key)) {
      seen.add(key);
      getClientColorInfo(ev.title);
    }
  });

  for (const [key, info] of Object.entries(clientColorMap)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${info.dotColor}"></div>${info.label}`;
    legendEl.appendChild(item);
  }
}

// ══════════════════════════════════════════════
// RENDER CALENDAR
// ══════════════════════════════════════════════
function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function buildCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const now = new Date();
  const windowDates = getRollingWindowDates(); // yesterday, today, +5 days

  // Week label — show date range
  const ws = windowDates[0];
  const we = windowDates[6];
  const rangeLabel = ws.getMonth() === we.getMonth()
    ? `${MONTH_NAMES[ws.getMonth()]} ${ws.getDate()} – ${we.getDate()}, ${ws.getFullYear()}`
    : `${MONTH_NAMES[ws.getMonth()]} ${ws.getDate()} – ${MONTH_NAMES[we.getMonth()]} ${we.getDate()}, ${we.getFullYear()}`;
  document.getElementById('weekLabel').textContent = rangeLabel;

  // Header row
  const timeCorner = document.createElement('div');
  timeCorner.className = 'time-header';
  cal.appendChild(timeCorner);

  windowDates.forEach((d, i) => {
    const hdr = document.createElement('div');
    const isToday = isSameDay(d, now);
    const isPast = d < now && !isToday;
    hdr.className = 'day-header' + (isToday ? ' today' : '') + (isPast ? ' past' : '');
    const dayName = isToday ? 'TODAY' : DAYS[d.getDay()];
    hdr.innerHTML = `${dayName}<span class="date-num">${d.getDate()}</span>`;
    cal.appendChild(hdr);
  });

  // Time labels column
  const timeCol = document.createElement('div');
  timeCol.className = 'time-labels';
  timeCol.style.position = 'relative';
  for (let h = activeHourStart; h <= activeHourEnd; h++) {
    const pct = ((h - activeHourStart) / activeTotalHours) * 100;
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.style.top = pct + '%';
    lbl.textContent = formatHourShort(h);
    timeCol.appendChild(lbl);
  }
  cal.appendChild(timeCol);

  // Day columns — matched by date key, not day-of-week index
  for (let colIdx = 0; colIdx < 7; colIdx++) {
    const colDate = windowDates[colIdx];
    const colKey = dateKey(colDate);
    const col = document.createElement('div');
    col.className = 'day-column';

    const isToday = isSameDay(colDate, now);
    const isPast = colDate < now && !isToday;
    if (isToday) col.classList.add('today-col');
    if (isPast) col.classList.add('past-col');

    // Hour grid lines
    for (let h = activeHourStart; h <= activeHourEnd; h++) {
      const pct = ((h - activeHourStart) / activeTotalHours) * 100;
      const line = document.createElement('div');
      line.className = 'hour-line-marker';
      line.style.top = pct + '%';
      col.appendChild(line);
    }

    // Events for this day — match by date, not day-of-week
    const dayEvents = currentEvents.filter(e => e.dateKey === colKey);
    dayEvents.forEach(ev => {
      const topPct = ((ev.startHour - activeHourStart) / activeTotalHours) * 100;
      const heightPct = ((ev.endHour - ev.startHour) / activeTotalHours) * 100;

      const colorInfo = getClientColorInfo(ev.title);
      const duration = ev.endHour - ev.startHour;
      const isCompact = duration <= 2;
      const block = document.createElement('div');
      block.className = 'event ' + colorInfo.class + (isCompact ? ' compact' : '');
      block.style.top = topPct + '%';
      block.style.height = heightPct + '%';

      block.innerHTML = `
        <div class="client-name">${ev.client}</div>
        <div class="time-range">${formatHour(Math.floor(ev.startHour))} – ${formatHour(Math.floor(ev.endHour))}</div>
        <div class="space-name">${ev.space}</div>
      `;
      col.appendChild(block);
    });

    // Now indicator
    if (isToday) {
      const nowH = now.getHours() + now.getMinutes() / 60;
      if (nowH >= activeHourStart && nowH <= activeHourEnd) {
        const nowPct = ((nowH - activeHourStart) / activeTotalHours) * 100;
        const nowLine = document.createElement('div');
        nowLine.className = 'now-line';
        nowLine.style.top = nowPct + '%';
        nowLine.innerHTML = '<div class="now-dot"></div>';
        col.appendChild(nowLine);
      }
    }

    if (dayEvents.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-day';
      empty.textContent = '—';
      col.appendChild(empty);
    }

    cal.appendChild(col);
  }
}

// ══════════════════════════════════════════════
// AUTO-SIZE CLIENT NAMES TO FIT EVENT BLOCKS
// ══════════════════════════════════════════════
function autoSizeClientNames() {
  document.querySelectorAll('.calendar .event').forEach(block => {
    const nameEl = block.querySelector('.client-name');
    const timeEl = block.querySelector('.time-range');
    if (!nameEl) return;

    const isCompact = block.classList.contains('compact');
    const maxFont = isCompact ? 22 : 28;
    const minFont = 13;

    // Reset to max size first
    nameEl.style.fontSize = maxFont + 'px';

    // Available height = block height minus time-range and padding
    const blockH = block.clientHeight;
    const padding = isCompact ? 4 : 20; // top+bottom padding
    const timeH = timeEl ? timeEl.offsetHeight + 3 : 0; // include margin
    const availH = blockH - padding - timeH;

    // Shrink until the name fits in available height, or we hit min font
    let fontSize = maxFont;
    while (fontSize > minFont && nameEl.scrollHeight > availH) {
      fontSize -= 1;
      nameEl.style.fontSize = fontSize + 'px';
    }

    // If still overflowing at min font, clip with ellipsis
    if (nameEl.scrollHeight > availH) {
      nameEl.style.display = '-webkit-box';
      nameEl.style.webkitLineClamp = '2';
      nameEl.style.webkitBoxOrient = 'vertical';
    }
  });
}

// ══════════════════════════════════════════════
// RENDER MOBILE VIEW
// ══════════════════════════════════════════════
function buildMobileView() {
  const container = document.getElementById('mobileView');
  container.innerHTML = '';

  const now = new Date();
  const windowDates = getRollingWindowDates(); // yesterday, today, +5 days
  const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  // Mobile legend
  const legend = document.createElement('div');
  legend.className = 'm-legend';
  for (const [key, info] of Object.entries(clientColorMap)) {
    legend.innerHTML += `<div class="m-legend-item"><div class="m-legend-dot" style="background:${info.dotColor}"></div>${info.label}</div>`;
  }
  container.appendChild(legend);

  // On mobile, start with today (skip yesterday) for a cleaner view
  // but still show yesterday at the bottom if user scrolls
  const todayFirst = [
    ...windowDates.slice(1),  // today + 5 future days
    windowDates[0]            // yesterday at bottom
  ];

  todayFirst.forEach(date => {
    const isToday = isSameDay(date, now);
    const isPast = date < now && !isToday;
    const colKey = dateKey(date);

    const section = document.createElement('div');
    section.className = 'm-day' + (isToday ? ' m-today' : '') + (isPast ? ' m-past' : '');

    const dayLabel = isToday ? 'Today' : (isPast ? 'Yesterday' : FULL_DAYS[date.getDay()]);
    const dateStr = `${MONTH_NAMES[date.getMonth()]} ${date.getDate()}`;
    section.innerHTML = `<div class="m-day-header">
      <span class="m-day-name">${dayLabel}</span>
      <span class="m-day-date">${dateStr}</span>
    </div>`;

    const dayEvents = currentEvents
      .filter(e => e.dateKey === colKey)
      .sort((a, b) => a.startHour - b.startHour);

    if (dayEvents.length === 0) {
      const noEv = document.createElement('div');
      noEv.className = 'm-no-events';
      noEv.textContent = 'No bookings';
      section.appendChild(noEv);
    } else {
      dayEvents.forEach(ev => {
        const colorInfo = getClientColorInfo(ev.title);
        const card = document.createElement('div');
        card.className = 'm-event ' + colorInfo.class;
        card.innerHTML = `<div class="m-event-info">
          <div class="m-client">${ev.client}</div>
          <div class="m-time">${formatHour(Math.floor(ev.startHour))} – ${formatHour(Math.floor(ev.endHour))}</div>
          <div class="m-space">${ev.space}</div>
        </div>`;
        section.appendChild(card);
      });
    }

    container.appendChild(section);
  });
}

// ══════════════════════════════════════════════
// CHANGELOG
// ══════════════════════════════════════════════
function toggleChangelog() {
  const overlay = document.getElementById('changelogOverlay');
  const isOpen = overlay.classList.toggle('open');
  if (isOpen) loadChangelog();
}

async function loadChangelog() {
  const list = document.getElementById('changelogList');
  try {
    const res = await fetch('changelog.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const entries = await res.json();

    if (!entries.length) {
      list.innerHTML = '<div class="changelog-empty">No changes recorded yet.</div>';
      return;
    }

    list.innerHTML = entries.map(e => {
      const d = new Date(e.time);
      const timeStr = d.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric'
      }) + ' at ' + d.toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit', hour12: true
      });
      const icon = e.type === 'added' ? '+' : e.type === 'removed' ? '−' : '~';
      return `<div class="changelog-entry type-${e.type}">
        <div class="changelog-time">${timeStr}</div>
        <div class="changelog-desc">${icon} ${e.description}</div>
      </div>`;
    }).join('');
  } catch (err) {
    list.innerHTML = '<div class="changelog-empty">No changes recorded yet.</div>';
  }
}

// ══════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
  });
}

// ══════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════
async function init() {
  await fetchEvents();
  computeHourRange();
  buildLegend();
  buildCalendar();
  autoSizeClientNames();
  buildMobileView();

  document.getElementById('lastUpdated').textContent =
    'Live from TFC via GitHub Actions';

  document.getElementById('loadingOverlay').classList.add('hidden');

  updateClock();
  setInterval(updateClock, 1000);

  // Rebuild calendar every minute (updates now-line)
  setInterval(() => { buildCalendar(); autoSizeClientNames(); buildMobileView(); }, 60 * 1000);

  // Re-fetch events.json at the configured interval
  setInterval(async () => {
    await fetchEvents();
    computeHourRange();
    buildLegend();
    buildCalendar();
    autoSizeClientNames();
    buildMobileView();
  }, CONFIG.REFRESH_INTERVAL);
}

// ══════════════════════════════════════════════
// JULY 4TH CELEBRATION (temporary: Jul 3–10, 2026)
// ══════════════════════════════════════════════
function isJuly4thWeek() {
  const now = new Date();
  const start = new Date(2026, 6, 3);  // Jul 3
  const end   = new Date(2026, 6, 11); // Jul 11 00:00 (so Jul 10 is last day)
  return now >= start && now < end;
}

function initJuly4th() {
  if (!isJuly4thWeek()) return;

  // Swap subtitle for logo
  document.getElementById('subtitleText').style.display = 'none';
  document.getElementById('america250Logo').style.display = 'inline-flex';

  // Show and size the fireworks canvas
  const canvas = document.getElementById('fireworksCanvas');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Firework particle system
  const fireworks = [];
  const particles = [];
  const COLORS = [
    '#ff4444', '#ff6644', '#ff2222',  // reds
    '#4488ff', '#2266ff', '#66aaff',  // blues
    '#ffffff', '#ffffcc', '#ffddaa',  // whites/golds
    '#ff4444', '#ff6644',             // more reds
    '#4488ff', '#2266ff',             // more blues
  ];

  class Firework {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = canvas.height;
      this.targetY = canvas.height * (0.15 + Math.random() * 0.45);
      this.speed = 3 + Math.random() * 3;
      this.trail = [];
      this.done = false;
    }
    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 8) this.trail.shift();
      this.y -= this.speed;
      if (this.y <= this.targetY) {
        this.explode();
        this.done = true;
      }
    }
    draw() {
      // Trail
      for (let i = 0; i < this.trail.length; i++) {
        const alpha = i / this.trail.length * 0.6;
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,220,180,${alpha})`;
        ctx.fill();
      }
      // Head
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#ffe8cc';
      ctx.fill();
    }
    explode() {
      const count = 60 + Math.floor(Math.random() * 40);
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
        const speed = 1.5 + Math.random() * 4;
        particles.push(new Particle(this.x, this.y, angle, speed, color));
      }
    }
  }

  class Particle {
    constructor(x, y, angle, speed, color) {
      this.x = x;
      this.y = y;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.alpha = 1;
      this.decay = 0.008 + Math.random() * 0.012;
      this.color = color;
      this.size = 1.5 + Math.random() * 1.5;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.04; // gravity
      this.vx *= 0.99;
      this.vy *= 0.99;
      this.alpha -= this.decay;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      ctx.restore();
    }
  }

  let frameCount = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    // Launch a new firework periodically (every ~90 frames = ~1.5s)
    if (frameCount % 90 === 0 || (frameCount % 50 === 0 && Math.random() > 0.5)) {
      fireworks.push(new Firework());
    }

    // Update & draw fireworks (rising)
    for (let i = fireworks.length - 1; i >= 0; i--) {
      fireworks[i].update();
      fireworks[i].draw();
      if (fireworks[i].done) fireworks.splice(i, 1);
    }

    // Update & draw particles (explosions)
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].alpha <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(animate);
  }

  // Kick off with a few fireworks right away
  fireworks.push(new Firework());
  setTimeout(() => fireworks.push(new Firework()), 400);
  setTimeout(() => fireworks.push(new Firework()), 900);
  animate();
}

initJuly4th();

init();
</script>
